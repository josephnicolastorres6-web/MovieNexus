<div class="favorites-page">
  <div class="header-titles">
    <h1 class="page-title">Mis <span style="color: var(--primary);">Favoritos</span></h1>
    <p class="subtitle">Tus películas guardadas para ver más tarde</p>
  </div>

  @if (favoriteMovies.length === 0) {
    <app-empty-state 
      icon="⭐" 
      title="Aún no tienes favoritos" 
      message="Explora el catálogo y guarda las películas que más te gusten." 
      actionText="Explorar Películas" 
      actionLink="/">
    </app-empty-state>
  } @else {
    <div class="movies-grid">
      @for (movie of favoriteMovies; track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
      }
    </div>
  }
</div>
