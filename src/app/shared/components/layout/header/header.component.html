<nav class="navbar">
  <div class="navbar-content">
    <div class="logo">
      <span class="logo-text">Movie<span class="text-accent" style="color: var(--accent);">Nexus</span></span>
    </div>
    <ul class="nav-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a></li>
      <li><a routerLink="/favorites" routerLinkActive="active">Favoritos</a></li>
    </ul>

    <div class="search-container">
      <input 
        type="text" 
        class="search-input" 
        placeholder="Buscar películas..." 
        [value]="searchQuery()" 
        (input)="onSearchInput($event)"
      >
      
      @if (isSearching()) {
        <div class="search-spinner"></div>
      }

      @if (searchResults().length > 0) {
        <div class="search-results-dropdown">
          @for (movie of searchResults(); track movie.id) {
            <a [routerLink]="['/movie', movie.id]" class="search-result-item" (click)="closeSearch()">
              <img [src]="movie.poster_path ? 'https://image.tmdb.org/t/p/w92' + movie.poster_path : 'assets/no-poster.png'" [alt]="movie.title" class="result-poster">
              <div class="result-info">
                <span class="result-title">{{ movie.title }}</span>
                <span class="result-year">{{ movie.release_date | date: 'yyyy' }}</span>
              </div>
            </a>
          }
        </div>
      }
    </div>
  </div>
</nav>
