<div class="favorites-page">
  <div class="header-titles">
    <h1 class="page-title">Mis <span style="color: var(--primary);">Favoritos</span></h1>
    <p class="subtitle">Tus películas guardadas para ver más tarde</p>
  </div>

  @if (favoriteMovies.length > 0) {
    <div class="movies-grid">
      @for (movie of favoriteMovies; track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
      }
    </div>
  } @else {
    <div class="empty-state">
      <svg viewBox="0 0 24 24" width="64" height="64" fill="rgba(255,255,255,0.2)" style="margin-bottom: 1rem;">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <h2>Tu lista está vacía</h2>
      <p>Aún no has guardado ninguna película. ¡Explora el catálogo y añade tus favoritas!</p>
      <a routerLink="/" class="btn-premium" style="margin-top: 1.5rem;">Explorar Películas</a>
    </div>
  }
</div>
