<div class="home-container">


  <main>
    @if (featuredMovie(); as movie) {
      <app-hero [movie]="movie"></app-hero>
    } @else {
      <div class="loading-hero">Cargando...</div>
    }

    <div class="home-sections">
      <app-movie-slider title="Tendencias de Hoy" [movies]="trendingMovies()"></app-movie-slider>
      <app-movie-slider title="Las más Populares" [movies]="popularMovies()"></app-movie-slider>
    </div>
  </main>
</div>
