<div class="movie-card" [routerLink]="['/movie', movie.id]">
  <button class="favorite-btn" [class.active]="isFavorite" (click)="toggleFavorite($event)">
    <svg class="heart-icon" viewBox="0 0 24 24" width="24" height="24" fill="rgba(255,255,255,0.5)">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
  </button>
  <div class="card-image-container">
    <img [src]="posterUrl" [alt]="movie.title" class="card-image" loading="lazy">
  </div>
  <div class="card-overlay">
    <h3 class="movie-title">{{ movie.title }}</h3>
    <div class="movie-rating">
      <span class="rating-icon">⭐</span>
      <span>{{ movie.vote_average | number: '1.1-1' }}</span>
    </div>
  </div>
</div>
